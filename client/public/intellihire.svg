<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C3BFA"/>
      <stop offset="50%" stop-color="#9B5FFE"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#6C3BFA" flood-opacity="0.6"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#4B00CC" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Hexagonal badge background -->
  <path
    d="M32 2 L58 17 L58 47 L32 62 L6 47 L6 17 Z"
    fill="url(#bgGrad)"
    filter="url(#shadow)"
  />

  <!-- Inner border ring -->
  <path
    d="M32 6.5 L53.5 19.5 L53.5 44.5 L32 57.5 L10.5 44.5 L10.5 19.5 Z"
    fill="none"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="1"
  />

  <!-- === BIG "I" letter === -->
  <!-- Top bar -->
  <rect x="11" y="17" width="10" height="4" rx="2" fill="white" filter="url(#textShadow)"/>
  <!-- Stem -->
  <rect x="14" y="21" width="4" height="16" rx="2" fill="white" filter="url(#textShadow)"/>
  <!-- Bottom bar -->
  <rect x="11" y="37" width="10" height="4" rx="2" fill="white" filter="url(#textShadow)"/>

  <!-- === BIG "H" letter === -->
  <!-- Left leg -->
  <rect x="25" y="17" width="4.5" height="24" rx="2" fill="white" filter="url(#textShadow)"/>
  <!-- Right leg -->
  <rect x="41.5" y="17" width="4.5" height="24" rx="2" fill="white" filter="url(#textShadow)"/>
  <!-- Crossbar -->
  <rect x="25" y="27" width="21" height="4" rx="2" fill="white" filter="url(#textShadow)"/>

  <!-- Neural spark node (top-right corner accent) -->
  <circle cx="54" cy="14" r="3.5" fill="url(#sparkGlow)" filter="url(#glow)"/>
  <circle cx="54" cy="14" r="1.8" fill="white" opacity="0.95"/>
  <line x1="54" y1="10" x2="54" y2="7" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="57.5" y1="10.5" x2="59.5" y2="8.5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="57.5" y1="14" x2="61" y2="14" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
